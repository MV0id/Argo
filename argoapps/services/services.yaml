project: services
source:
  repoURL: https://github.com/MV0id/Argo.git
  path: argoapps/services
  targetRevision: HEAD
  directory:
    recurse: true
    jsonnet: {}
destination:
  server: https://kubernetes.default.svc
  namespace: argocd
syncPolicy:
  automated:
    prune: true
    selfHeal: true
